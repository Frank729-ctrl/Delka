name: DelkaAI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── TEST ────────────────────────────────────────────────────────────────────
  test:
    name: Unit · Integration · Security Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: delkaai_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=testpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      PORT: 8000
      SECRET_MASTER_KEY: fd-delka-mk-ci-test-key-00000000
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: delkaai_test
      DB_USER: testuser
      DB_PASSWORD: testpassword
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.1
      OLLAMA_TIMEOUT_SECONDS: 10
      OLLAMA_STREAM_TIMEOUT_SECONDS: 10
      ARGON2_TIME_COST: 1
      ARGON2_MEMORY_COST: 8192
      ARGON2_PARALLELISM: 1
      HMAC_TIMESTAMP_TOLERANCE_SECONDS: 300
      RATE_LIMIT_PER_MINUTE: 1000
      RATE_LIMIT_PER_IP_MINUTE: 1000
      RATE_LIMIT_BURST_PER_SECOND: 100
      LLM_MAX_RETRIES: 1
      WEBHOOK_TIMEOUT_SECONDS: 5
      WEBHOOK_MAX_RETRIES: 1
      ALLOWED_ORIGINS: "*"
      METRICS_PERSIST_INTERVAL_SECONDS: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            libxml2 \
            libxslt1.1 \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            --cov=. \
            --cov-append \
            --cov-report=term-missing \
            -v

      - name: Run security tests
        run: |
          pytest tests/security/ \
            --cov=. \
            --cov-append \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── DEPLOY ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec -T api python -c "from database import create_all_tables; import asyncio; asyncio.run(create_all_tables())"
            docker compose ps
            echo "Deploy complete: $(date)"
