<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DelkaAI Console</title>
  <link rel="stylesheet" href="/static/console/console.css" />
</head>
<body class="light auth-page">
  <div class="auth-card">
    <div class="auth-logo">⬡ DelkaAI</div>
    <h1>Developer Console</h1>
    {% if registered %}
    <div class="alert alert-success">Account created! Please sign in.</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/console/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@company.com" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required />
      </div>
      <button type="submit" class="btn btn-primary full-width">Sign In</button>
    </form>
    <div class="auth-footer">
      No account yet? <a href="/console/register">Register</a>
    </div>
  </div>
</body>
</html>
